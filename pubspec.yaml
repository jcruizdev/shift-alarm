name: app_empleados
description: >
  Aplicación móvil (Android) para el rol Empleado — gestión de turnos
  con alarmas automáticas. Parte del monorepo turnos_saas.
publish_to: 'none'
version: 0.1.0
 
environment:
  sdk: '>=3.4.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
 
  # Manejo de estado / inyección de dependencias
  flutter_riverpod: ^2.5.1
 
  # Navegación
  go_router: ^14.2.0
 
  # Firebase (SDKs agregados, sin inicialización todavía)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
 
  # Alarmas / notificaciones locales
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
 
  # Internacionalización / formateo de fechas y horas
  intl: ^0.19.0
 
  cupertino_icons: ^1.0.8
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
 
flutter:
  uses-material-design: true